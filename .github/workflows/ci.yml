name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff Check
        run: ruff check .
      - name: Mypy
        run: mypy app
      - name: Pytest
        run: pytest -q
      - name: Coverage
        run: pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term
